<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer ou modifier une entreprise</title>
  <meta name="description" content="Création ou modification d'une fiche entreprise.">
</head>

<body>
  <a href="#contenu">Aller au contenu</a>

  <header>
    <nav aria-label="Navigation principale">
      <ul>
        <li><a href="accueil.html">Accueil</a></li>
        <li><a href="offres.html">Offres</a></li>
        <li><a href="entreprises.html">Entreprises</a></li>
      </ul>
    </nav>
  </header>

  <main id="contenu">
    <nav aria-label="Fil d’ariane">
      <p>
        <a href="accueil.html">Accueil</a> &gt;
        <a href="entreprises.html">Entreprises</a> &gt;
        Création / modification
      </p>
    </nav>

    <section>
      <h1>Créer / modifier une entreprise</h1>
      <p>Formulaire de gestion d’une entreprise.</p>
    </section>

    <section>
      <form action="#" method="post">
        <p>
          <label for="nom">Nom</label><br>
          <input type="text" id="nom" name="nom" required>
        </p>

        <p>
          <label for="email">Email de contact</label><br>
          <input type="email" id="email" name="email" required>
        </p>

        <p>
          <label for="telephone">Téléphone</label><br>
          <input type="tel" id="telephone" name="telephone">
        </p>

        <p>
          <label for="ville">Ville</label><br>
          <input type="text" id="ville" name="ville">
        </p>

        <p>
          <label for="description">Description</label><br>
          <textarea id="description" name="description" rows="6"></textarea>
        </p>

        <p>
          <button type="submit">Enregistrer</button>
          <a href="entreprises.html">Annuler</a>
        </p>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2026 – Projet CESI</p>
  </footer>
</body>
</html>
