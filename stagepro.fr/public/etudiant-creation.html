<body>

  <header>
    <nav aria-label="Navigation principale">

  <main id="contenu">
    <nav aria-label="Fil d’ariane">

        <a href="accueil.html">Accueil</a> &gt;

    <section>
      <h1>Créer / modifier un étudiant</h1>
      <p>Formulaire de gestion d’un compte étudiant.</p>
    </section>

    <section>
      <form action="#" method="post" aria-label="Formulaire création/modification étudiant">

        <p>
          <label for="nom">Nom</label><br>
          <input type="text" id="nom" name="nom" required>
        </p>

        <p>
          <label for="prenom">Prénom</label><br>
          <input type="text" id="prenom" name="prenom" required>
        </p>

        <p>
          <label for="email">Email</label><br>
          <input type="email" id="email" name="email" required>
        </p>

        <p>
          <label for="etat">État de la recherche</label><br>
          <select id="etat" name="etat" required>
            <option value="">Sélectionner</option>
            <option value="non_commence">Non commencée</option>
            <option value="en_cours">En cours</option>
            <option value="entretiens">Entretiens</option>
            <option value="stage_trouve">Stage trouvé</option>
          </select>
        </p>

        <p>
          <button type="submit">Enregistrer</button>
          <a href="etudiant.html">Annuler</a>
        </p>
      </form>
    </section>
  </main>

  <footer>
