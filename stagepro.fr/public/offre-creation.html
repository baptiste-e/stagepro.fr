<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer ou modifier une offre</title>
  <meta name="description" content="Création ou modification d'une offre de stage.">
</head>

<body>
  <a href="#contenu">Aller au contenu</a>

  <header>
    <nav aria-label="Navigation principale">
      <ul>
        <li><a href="accueil.html">Accueil</a></li>
        <li><a href="offres.html">Offres</a></li>
        <li><a href="entreprises.html">Entreprises</a></li>
      </ul>
    </nav>
  </header>

  <main id="contenu">
    <nav aria-label="Fil d’ariane">
      <p>
        <a href="accueil.html">Accueil</a> &gt;
        <a href="offres.html">Offres</a> &gt;
        Création / modification
      </p>
    </nav>

    <section>
      <h1>Créer / modifier une offre</h1>
      <p>Formulaire de création ou modification d’une offre de stage.</p>
    </section>

    <section>
      <form action="#" method="post" aria-label="Formulaire création/modification offre">

        <p>
          <label for="titre">Titre</label><br>
          <input type="text" id="titre" name="titre" required>
        </p>

        <p>
          <label for="description">Description</label><br>
          <textarea id="description" name="description" rows="6" required></textarea>
        </p>

        <p>
          <label for="entreprise">Entreprise</label><br>
          <input type="text" id="entreprise" name="entreprise" required>
        </p>

        <p>
          <label for="competences">Compétences</label><br>
          <input type="text" id="competences" name="competences" placeholder="Ex : HTML, CSS, SQL..." required>
        </p>

        <p>
          <label for="remuneration">Base de rémunération</label><br>
          <input type="number" id="remuneration" name="remuneration" min="0" required>
        </p>

        <p>
          <label for="date">Date de l’offre</label><br>
          <input type="date" id="date" name="date" required>
        </p>

        <p>
          <button type="submit">Enregistrer</button>
          <a href="offres.html">Annuler</a>
        </p>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2026 – Projet CESI</p>
  </footer>
</body>
</html>
